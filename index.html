<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout Calendar</title>
<style>
body{font-family:Arial; background:#f4f6f8; text-align:center;}
#calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; max-width:700px; margin:auto;}
.day{background:white; padding:15px; border-radius:8px; cursor:pointer; border:1px solid #ddd;}
.today{background:#4CAF50; color:white; font-weight:bold;}
#details{margin-top:20px; padding:20px; background:white; max-width:700px; margin-left:auto; margin-right:auto; border-radius:10px; border:1px solid #ddd; text-align:left;}
button{padding:8px 15px; margin:5px; border:none; background:#4CAF50; color:white; border-radius:5px; cursor:pointer;}
.infoBtn{background:#2196F3; padding:3px 8px; font-size:12px; margin-left:5px;}
input{width:80px; margin:3px;}
#infoModal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
#modalContent{background:white; padding:20px; max-width:400px; margin:100px auto; border-radius:10px; text-align:left;}
</style>
</head>
<body>

<h2 id="monthTitle"></h2>

<button onclick="prevMonth()">Previous</button>
<button onclick="nextMonth()">Next</button>
<button onclick="window.print()">Print Report</button>

<div id="calendar"></div>

<div id="details"><h3>Select a date to see workout</h3></div>

<div id="infoModal">
<div id="modalContent">
<h3 id="exerciseTitle"></h3>
<p id="exerciseInfo"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let currentMonth=2;
let currentYear=2026;

/* Workout plan */
const workouts={
"Mon":{
pre:"Eat banana + peanut butter OR bread + egg. Drink water 30–90 minutes before climbing.",
warmup:[
{name:"Jumping jacks", sets:1, reps:"60 sec"},
{name:"Arm circles", sets:1, reps:"30 sec"},
{name:"Wrist circles", sets:1, reps:"30 sec"},
{name:"Scapula pull ups", sets:1, reps:"10"}
],
main:[
{name:"Climbing", sets:1, reps:"practice"},
{name:"Pull ups", sets:4, reps:"6-8"},
{name:"Hanging leg raises", sets:3, reps:"10"}
],
cooldown:[
{name:"Forearm stretch", sets:1, reps:"30 sec"},
{name:"Shoulder stretch", sets:1, reps:"30 sec"}
],
post:"Stretch forearms and shoulders. Eat eggs + bread or yogurt + fruit."
},

"Tue":{
pre:"Light carbs like oatmeal or fruit before cardio.",
warmup:[
{name:"Light jog", sets:1, reps:"5 min"},
{name:"Hip rotation", sets:1, reps:"10"}
],
main:[
{name:"Jogging", sets:1, reps:"3-5 km"},
{name:"Plank", sets:3, reps:"40 sec"}
],
cooldown:[
{name:"Hamstring stretch", sets:1, reps:"30 sec"},
{name:"Quad stretch", sets:1, reps:"30 sec"}
],
post:"Hydrate and eat balanced meal with protein."
},

"Wed":{
pre:"Banana or toast with peanut butter.",
warmup:[
{name:"Arm swing", sets:1, reps:"30 sec"},
{name:"Scapula activation", sets:1, reps:"10"}
],
main:[
{name:"Dead hang", sets:4, reps:"30 sec"},
{name:"Towel hang", sets:3, reps:"20 sec"},
{name:"Russian twist", sets:3, reps:"20"}
],
cooldown:[
{name:"Forearm stretch", sets:1, reps:"30 sec"},
{name:"Lat stretch", sets:1, reps:"30 sec"}
],
post:"Stretch fingers and forearms. Eat protein meal."
},

"Thu":{
pre:"Light snack if needed.",
warmup:[{name:"Dynamic stretch", sets:1, reps:"3 min"}],
main:[{name:"Mobility session", sets:1, reps:"10 min"}],
cooldown:[{name:"Back stretch", sets:1, reps:"1 min"}],
post:"Focus on hydration and recovery."
},

"Fri":{
pre:"Bread + egg or yogurt + fruit.",
warmup:[
{name:"Jumping jacks", sets:1, reps:"60 sec"},
{name:"Shoulder mobility", sets:1, reps:"10"}
],
main:[
{name:"Climbing", sets:1, reps:"practice"},
{name:"Pike push ups", sets:4, reps:"8"},
{name:"Plank", sets:3, reps:"45 sec"}
],
cooldown:[
{name:"Shoulder stretch", sets:1, reps:"30 sec"},
{name:"Back stretch", sets:1, reps:"30 sec"}
],
post:"Protein meal within 1 hour."
},

"Sat":{
pre:"Oatmeal or toast + eggs.",
warmup:[{name:"Dynamic stretch", sets:1, reps:"2 min"}],
main:[
{name:"Squats", sets:4, reps:"12"},
{name:"Pull ups", sets:4, reps:"max"},
{name:"Dead hang", sets:3, reps:"30 sec"},
{name:"Leg raises", sets:3, reps:"12"}
],
cooldown:[
{name:"Hip flexor stretch", sets:1, reps:"30 sec"},
{name:"Back stretch", sets:1, reps:"30 sec"}
],
post:"Recovery meal with carbs + protein."
},

"Sun":{
pre:"Rest day",
warmup:[],
main:[],
cooldown:[],
post:"Full rest and sleep."
}
};

/* Exercise info */
const exerciseInfo={
"Jumping jacks":"Full body warmup jumping movement.",
"Arm circles":"Rotate arms slowly to warm shoulder joints.",
"Wrist circles":"Rotate wrists to warm up finger tendons.",
"Scapula pull ups":"Hang and pull shoulders down without bending arms.",
"Climbing":"Practice bouldering routes.",
"Pull ups":"Pull body upward until chin passes the bar.",
"Hanging leg raises":"Raise legs while hanging for core.",
"Light jog":"Jog slowly to warm muscles.",
"Hip rotation":"Rotate hips to loosen joints.",
"Jogging":"Steady pace running.",
"Plank":"Hold body straight using core.",
"Dead hang":"Hang from bar to build grip.",
"Towel hang":"Hang using towel for stronger grip.",
"Russian twist":"Rotate torso for core.",
"Dynamic stretch":"Moving stretches.",
"Mobility session":"Light stretching session.",
"Back stretch":"Stretch lower back.",
"Shoulder mobility":"Warm shoulder joints.",
"Pike push ups":"Shoulder push ups.",
"Squats":"Strengthen legs.",
"Hip flexor stretch":"Stretch front hip.",
"Lat stretch":"Stretch back muscles.",
"Forearm stretch":"Stretch forearms.",
"Shoulder stretch":"Stretch shoulder.",
"Hamstring stretch":"Stretch hamstring.",
"Quad stretch":"Stretch quadriceps."
};

/* TIMER */
let timerInterval;

function startTimer(seconds,id){
clearInterval(timerInterval);
let remaining=seconds;

timerInterval=setInterval(()=>{
let min=Math.floor(remaining/60);
let sec=remaining%60;
document.getElementById(id).innerText=(min>0?min+"m ":"")+sec+"s";
remaining--;
if(remaining<0){
clearInterval(timerInterval);
document.getElementById(id).innerText="Done!";
}
},1000);
}

/* Save progress */
function saveProgress(dateKey,name,sets,reps){
let data=JSON.parse(localStorage.getItem("workoutProgress")||"{}");
if(!data[dateKey]) data[dateKey]={};
if(!data[dateKey][name]) data[dateKey][name]={};
if(sets!==null) data[dateKey][name].sets=sets;
if(reps!==null) data[dateKey][name].reps=reps;
localStorage.setItem("workoutProgress",JSON.stringify(data));
}

function getProgress(dateKey,name){
let data=JSON.parse(localStorage.getItem("workoutProgress")||"{}");
return data?.[dateKey]?.[name] || {};
}

function addTimerIfNeeded(name,reps){
let id="timer_"+name.replace(/\s/g,'');
if(reps.includes("sec")){
let sec=parseInt(reps);
return `<button onclick="startTimer(${sec},'${id}')">Timer</button> <span id="${id}"></span>`;
}
if(reps.includes("min")){
let sec=parseInt(reps)*60;
return `<button onclick="startTimer(${sec},'${id}')">Timer</button> <span id="${id}"></span>`;
}
return "";
}

function renderList(title,list,dateKey){
let html=`<h4>${title}</h4>`;
list.forEach(w=>{
let val=getProgress(dateKey,w.name);
html+=`
<div>
${w.name} (${w.sets} sets x ${w.reps})
<button class="infoBtn" onclick="showInfo('${w.name}')">ℹ</button>
${addTimerIfNeeded(w.name,w.reps)}
<br>
Sets Achieved
<input type="number" value="${val.sets||''}" onchange="saveProgress('${dateKey}','${w.name}',this.value,null)">
Reps/Time
<input type="number" value="${val.reps||''}" onchange="saveProgress('${dateKey}','${w.name}',null,this.value)">
</div>
`;
});
return html;
}

function showWorkout(date){
let day=date.toLocaleDateString('en-US',{weekday:'short'});
let data=workouts[day];
let dateKey=date.toISOString().split("T")[0];

let html=`<h3>${day} Workout</h3>`;
html+=`<h4>Pre-Workout</h4><p>${data.pre}</p>`;
html+=renderList("Warm Up",data.warmup,dateKey);
html+=renderList("Workout",data.main,dateKey);
html+=renderList("Cool Down",data.cooldown,dateKey);
html+=`<h4>Post-Workout</h4><p>${data.post}</p>`;

document.getElementById("details").innerHTML=html;
}

/* Calendar */
function generateCalendar(){
const calendar=document.getElementById("calendar");
calendar.innerHTML="";
let firstDay=new Date(currentYear,currentMonth,1).getDay();
let days=new Date(currentYear,currentMonth+1,0).getDate();

document.getElementById("monthTitle").innerText=
new Date(currentYear,currentMonth).toLocaleString('default',{month:'long'})+" "+currentYear;

for(let i=0;i<firstDay;i++) calendar.appendChild(document.createElement("div"));

for(let d=1;d<=days;d++){
let date=new Date(currentYear,currentMonth,d);
let today=new Date();

let cell=document.createElement("div");
cell.className="day";
cell.innerText=d;

if(d===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear())
cell.classList.add("today");

cell.onclick=()=>showWorkout(date);

calendar.appendChild(cell);
}
}

/* Popup */
function showInfo(name){
document.getElementById("exerciseTitle").innerText=name;
document.getElementById("exerciseInfo").innerText=exerciseInfo[name] || "";
document.getElementById("infoModal").style.display="block";
}

function closeModal(){
document.getElementById("infoModal").style.display="none";
}

/* Navigation */
function prevMonth(){
currentMonth--;
if(currentMonth<0){currentMonth=11;currentYear--;}
generateCalendar();
}

function nextMonth(){
currentMonth++;
if(currentMonth>11){currentMonth=0;currentYear++;}
generateCalendar();
}

generateCalendar();

</script>
</body>
</html>
