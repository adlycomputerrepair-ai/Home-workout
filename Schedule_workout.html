<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout Calendar</title>
<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
max-width:700px;
margin:auto;
}

.day{
background:white;
padding:15px;
border-radius:8px;
cursor:pointer;
border:1px solid #ddd;
}

.today{
background:#4CAF50;
color:white;
font-weight:bold;
}

#details{
margin-top:20px;
padding:20px;
background:white;
max-width:700px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:8px 15px;
margin:5px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
width:80px;
margin:3px;
}

</style>
</head>
<body>

<h2 id="monthTitle"></h2>

<button onclick="prevMonth()">Previous</button>
<button onclick="nextMonth()">Next</button>
<button onclick="window.print()">Print Report</button>

<div id="calendar"></div>

<div id="details">
<h3>Select a date to see workout</h3>
</div>

<script>

let currentMonth=2; // March
let currentYear=2026;

const workouts={
"Mon":{
warmup:["Jumping jacks 1 min","Arm circles 30 sec","10 squats"],
main:["Push ups 4 x 10","Plank 3 x 40 sec","Leg raises 3 x 10"],
cooldown:["Chest stretch","Shoulder stretch","Child pose"]
},
"Tue":{
warmup:["Light jog 2 min","Leg swing"],
main:["Jogging 2-3 km"],
cooldown:["Hamstring stretch","Quad stretch"]
},
"Wed":{
warmup:["Arm swing","Scapula activation"],
main:["Pull ups 4 sets","Dead hang 40 sec x3","Scapula pull ups 10 reps"],
cooldown:["Lat stretch","Forearm stretch"]
},
"Fri":{
warmup:["Arm circles","Shoulder mobility"],
main:["Pike push ups 4 x 8","Russian twist 3 x 20"],
cooldown:["Shoulder stretch"]
},
"Sat":{
warmup:["Dynamic stretch"],
main:["Climbing or Squats 4 x 12","Plank 45 sec"],
cooldown:["Hip flexor stretch","Back stretch"]
}
};

function generateCalendar(){

const calendar=document.getElementById("calendar");
calendar.innerHTML="";

let firstDay=new Date(currentYear,currentMonth,1).getDay();
let days=new Date(currentYear,currentMonth+1,0).getDate();

document.getElementById("monthTitle").innerText=
new Date(currentYear,currentMonth).toLocaleString('default',{month:'long'})+" "+currentYear;

for(let i=0;i<firstDay;i++){
let blank=document.createElement("div");
calendar.appendChild(blank);
}

for(let d=1;d<=days;d++){

let date=new Date(currentYear,currentMonth,d);
let today=new Date();

let cell=document.createElement("div");
cell.className="day";
cell.innerText=d;

if(d===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear()){
cell.classList.add("today");
}

cell.onclick=()=>showWorkout(date);

calendar.appendChild(cell);
}
}

function showWorkout(date){

let day=date.toLocaleDateString('en',{weekday:'short'});

let data=workouts[day];

let html="<h3>"+date.toDateString()+"</h3>";

if(!data){
html+="Rest Day";
}else{

html+="<h4>Warm Up</h4>";
data.warmup.forEach(w=>{
html+="<div>"+w+"</div>";
});

html+="<h4>Workout</h4>";

data.main.forEach((w,i)=>{
html+=`
<div>
${w}
<br>
Sets Achieved <input type="number">
Reps/Time <input type="number">
</div>
`;
});

html+="<h4>Cool Down</h4>";

data.cooldown.forEach(c=>{
html+="<div>"+c+"</div>";
});

}

document.getElementById("details").innerHTML=html;

}

function prevMonth(){
currentMonth--;
if(currentMonth<0){
currentMonth=11;
currentYear--;
}
generateCalendar();
}

function nextMonth(){
currentMonth++;
if(currentMonth>11){
currentMonth=0;
currentYear++;
}
generateCalendar();
}

generateCalendar();

</script>

</body>
</html>
